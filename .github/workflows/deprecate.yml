name: Deprecate

# Manually-triggered. Uses the org NPM_TOKEN exactly like release.yml does, so
# we don't depend on a local WebAuthn session in ~/.npmrc. Run via:
#   gh workflow run deprecate.yml \
#     -f versionRange='<0.7.0' \
#     -f message='outdated — install @yawlabs/aws-mcp@latest'
#
# Inputs are passed to npm via env vars (not ${{ }} interpolation inside the
# run: script) so a malicious / typo'd input can't escape the argv and run
# arbitrary shell. `npm deprecate <pkg>@<range> <message>` accepts any
# semver range npm itself accepts: '<0.7.0', '0.5.x', '0.6.0', etc.

on:
  workflow_dispatch:
    inputs:
      versionRange:
        description: 'Semver range to deprecate (e.g. "<0.7.0", "0.5.x", "0.6.0").'
        required: true
        type: string
      message:
        description: 'Deprecation message users see on install (em-dash, lowercase after dash, no trailing period -- per CLAUDE.md).'
        required: true
        type: string

# Serialize against release.yml so a deprecate run can't collide with a
# concurrent publish. Same group key as release.yml; cancel-in-progress is
# false so a queued run waits its turn instead of being killed.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  deprecate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Deprecate versions
        env:
          VERSION_RANGE: ${{ inputs.versionRange }}
          MESSAGE: ${{ inputs.message }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "Deprecating @yawlabs/aws-mcp@${VERSION_RANGE}"
          echo "Message: ${MESSAGE}"
          npm deprecate "@yawlabs/aws-mcp@${VERSION_RANGE}" "${MESSAGE}"

      - name: Verify
        run: |
          set -euo pipefail
          # Dump per-version deprecation state so the run log shows which
          # versions are now marked vs. left alone. `npm view <pkg> versions
          # --json` + a small jq is more useful than re-running deprecate
          # against another range. We don't fail on mismatch -- npm's range
          # resolution is the source of truth and the operator audits the
          # output.
          echo "Per-version deprecation state:"
          for v in $(npm view @yawlabs/aws-mcp versions --json | jq -r '.[]'); do
            dep=$(npm view "@yawlabs/aws-mcp@${v}" deprecated 2>/dev/null || echo "")
            if [ -n "$dep" ]; then
              echo "  ${v}: DEPRECATED -- ${dep}"
            else
              echo "  ${v}: active"
            fi
          done
